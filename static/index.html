<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form ADV Lookup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    input[type=text] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d1d6;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }

    input[type=text]:focus { border-color: #0071e3; }

    .hint {
      font-size: .78rem;
      color: #888;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }

    button:disabled { background: #a0c4f1; cursor: default; }
    button:not(:disabled):hover { background: #005bbf; }

    #status {
      margin-top: 16px;
      font-size: .85rem;
      color: #888;
      min-height: 20px;
    }

    #result {
      margin-top: 20px;
      background: #f5f5f7;
      border-radius: 8px;
      padding: 20px;
      white-space: pre-wrap;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: .82rem;
      line-height: 1.6;
      color: #1d1d1f;
      display: none;
    }

    .error { color: #d70015; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Form ADV Lookup</h1>

    <label for="query">Firm name or CRD number</label>
    <input type="text" id="query" placeholder="e.g. Gavilan Investment Partners or 311134" autocomplete="off">
    <p class="hint">Enter a firm name or paste a CRD number directly.</p>

    <button id="btn" onclick="lookup()">Look up</button>
    <div id="status"></div>
    <pre id="result"></pre>
  </div>

  <script>
    const input  = document.getElementById('query');
    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

    async function lookup() {
      const raw = input.value.trim();
      if (!raw) return;

      btn.disabled = true;
      result.style.display = 'none';
      result.className = '';
      status.textContent = 'Fetching ADV — this can take 15-30 seconds…';

      const body = /^\d+$/.test(raw) ? { crd: raw } : { name: raw };

      try {
        const resp = await fetch('/lookup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await resp.json();

        if (!resp.ok) {
          result.className = 'error';
          result.textContent = data.detail || 'Unknown error';
        } else {
          result.textContent = data.output;
        }
        result.style.display = 'block';
        status.textContent = '';
      } catch (err) {
        result.className = 'error';
        result.textContent = 'Network error: ' + err.message;
        result.style.display = 'block';
        status.textContent = '';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
